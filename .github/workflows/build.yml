name: Build site

on:
  push:
    branches: [ "dev" ]
  pull_request:
    types:
      - opened
      - reopened
      - synchronize
      - closed

concurrency: preview-${{ github.ref }}

env:
  CARGO_TERM_COLOR: always

jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/dev'
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
      - name: Build and deploy
        uses: shalzz/zola-deploy-action@v0.21.0
        env:
          PAGES_BRANCH: gh-pages
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          BUILD_FLAGS: --base-url https://nimbinatus.com/RedHatOfficial.github.io
  preview:
    runs-on: ubuntu-latest
    if: github.ref != 'refs/heads/dev'
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: checkme
        run: ls -la
      - name: Install and build
        if: github.event.action != 'closed'
        run: shalzz/zola-deploy-action@v0.21.0
        env:
          BUILD_DIR: .
          BUILD_ONLY: true
          BUILD_FLAGS: --base-url https://nimbinatus.com/RedHatOfficial.github.io --drafts
          # BUILD_THEMES: false
          # CHECK_LINKS: true
      - name: Deploy preview
        uses: rossjrw/pr-preview-action@v1
        id: preview-step
